# nginx config for the SINGLE-IMAGE release (ghcr.io/einperegrin/certpulse).
#
# This file is a sibling of packages/web/nginx.conf (the compose-friendly
# config that proxies to the `api` Docker service). It differs in TWO
# respects that make it work inside a single combined image:
#
#   1. The upstream is 127.0.0.1:3000, not the Docker-DNS hostname `api`.
#      In the combined image, the api process runs on the container's
#      loopback interface (PID 2+ in the start.sh process tree).
#
#   2. `resolver 127.0.0.11` is REMOVED. The Docker embedded DNS resolver
#      is only meaningful when the upstream is another Docker service;
#      with a loopback literal nginx resolves at startup and that
#      resolution stays valid for the life of the container.
#
# Everything else — security headers, /health, gzip, /api/ proxy, the SPA
# catch-all — is identical to packages/web/nginx.conf and follows the
# same hardening pattern documented there (Task 1.8).
#
# If you change security headers or the /api/ routing here, mirror the
# change in packages/web/nginx.conf so the two configurations stay in
# lockstep.

server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /var/www/certpulse;
    index index.html;

    # Debian's nginx default runs workers as `www-data` (UID 33). The
    # master process is the one we start in start.sh — it stays root
    # long enough to bind :80, then workers drop to www-data via the
    # `user www-data;` directive inherited from /etc/nginx/nginx.conf.
    # (We do not redeclare `user` here; the master config in
    # /etc/nginx/nginx.conf already does.)

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ---- Security headers (Task 1.8 — same as packages/web/nginx.conf) -
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"     always;
    add_header Referrer-Policy        "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self';" always;

    # ---- /health (used by the docker HEALTHCHECK and by the start.sh
    #      readiness probe — start.sh curls this URL to know when the
    #      api is ready to accept traffic). ----
    location = /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"ok":true}';
    }

    # ---- MSW worker guard (v0.5 / Bug 4) ----------------------------
    # Same rationale as in packages/web/nginx.conf. 404 explicitly so a
    # browser's ServiceWorker registration never sees HTML.
    location = /mockServiceWorker.js {
        access_log off;
        add_header Content-Type text/plain;
        return 404 "Not Found\n";
    }

    # ---- /api/ → upstream api on loopback ----
    # The api listens on 127.0.0.1:3000 inside the container (set via
    # PORT=3000 in the start.sh export). Nginx sees it on the same
    # machine, no Docker-DNS indirection. The api enforces its own
    # auth on the upstream side; we FORWARD the dashboard's
    # Authorization header so the bearer token entered on /login
    # actually reaches the auth middleware. (v0.5 / Bug 2 fix —
    # prior version cleared this header, which left every /api/*
    # call unauthenticated in production.)
    location /api/ {
        set $api_upstream http://127.0.0.1:3000;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
    }

    # ---- SPA catch-all ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
