name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Linux deps (better-sqlite3 build)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3 make g++ openssl ca-certificates

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint (typecheck)
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Docker compose config
        run: docker compose config -q

      - name: Build api image
        run: docker build -t certpulse-api:test -f packages/api/Dockerfile .

      - name: Build web image
        run: docker build -t certpulse-web:test -f packages/web/Dockerfile .
