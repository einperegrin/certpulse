server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ---- Security headers (Task 1.8) --------------------------------
    # nosniff: don't let browsers MIME-sniff response bodies
    # DENY: never allow this site to be framed (clickjacking)
    # no-referrer: don't leak the dashboard URL in outbound links
    # CSP: only resources from this origin can be loaded/executed; the
    #       'unsafe-inline' on style-src is required because Vite/Tailwind
    #       emit inline <style> blocks in index.html.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"     always;
    add_header Referrer-Policy        "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self';" always;

    # ---- /health ----------------------------------------------------
    # Public, lightweight — used by the docker healthcheck and load
    # balancers. We keep it OUT of the /api/ proxy so it doesn't
    # require a bearer token and doesn't wake the upstream.
    location = /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"ok":true}';
    }

    # ---- MSW worker guard (v0.5 / Bug 4) ----------------------------
    # Production nginx logs showed GET /mockServiceWorker.js. MSW is
    # NOT a dependency of the web package and the build pipeline drops
    # any matching chunk — but a stale image or a future regression
    # could still try to fetch it. 404 explicitly so we don't fall
    # through to index.html (which would return HTML, not JS, and break
    # a browser's ServiceWorker registration).
    location = /mockServiceWorker.js {
        access_log off;
        add_header Content-Type text/plain;
        return 404 "Not Found\n";
    }

    # ---- /api/ → upstream api ---------------------------------------
    # Authorization is FORWARDED. The dashboard reads an API token
    # from localStorage (entered via /login) and sends it as
    # `Authorization: Bearer …`. The api's auth middleware validates
    # the token; nginx is just a TCP proxy here.
    #
    # History: an earlier revision (Task 1.8 hardening) cleared this
    # header on the public-facing hop as defense-in-depth against a
    # misconfigured external proxy injecting a stale header. That
    # defense also meant the dashboard — the *only* real client of
    # /api/* — could never authenticate, so every request 401'd in
    # production. With the dashboard now living behind the same nginx
    # and the api validating the token itself, forwarding is correct.
    #
    # The `resolver 127.0.0.11` is Docker's embedded DNS. Using a variable
    # for the upstream forces nginx to resolve at request time so the
    # container recovers if the api service is restarted (its IP can
    # change). If api is unreachable, the proxy returns 502 instead of
    # failing to start.
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $api_upstream http://api:3000;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Forward Authorization so the dashboard's bearer token reaches
        # the api's auth middleware. (v0.5 / Bug 2 fix.)
        proxy_set_header Authorization     $http_authorization;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
