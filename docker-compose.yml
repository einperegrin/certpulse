services:
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    # Do NOT expose the api on a host port. All traffic must go
    # through the nginx reverse proxy in the `web` service. If an
    # operator really needs to reach the API directly (e.g. for the
    # token CLI from the host), they can `docker compose exec api ...`.
    expose:
      - "3000"
    volumes:
      - certpulse-data:/app/data
    environment:
      - DATABASE_PATH=/app/data/certpulse.db
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - ALERT_EMAIL_FROM=${ALERT_EMAIL_FROM:-certpulse@localhost}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-}
      - CHECK_INTERVAL=${CHECK_INTERVAL:-60}
      - PORT=3000
      - NODE_ENV=production
    # Read-only root filesystem — only the data volume is writable.
    # /tmp gets a tmpfs in case anything wants scratch space.
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    # Drop all Linux capabilities, then add only what the entrypoint
    # needs to (1) repair /app/data ownership on volumes inherited from
    # older images and (2) drop to UID 10001 before exec-ing node.
    # CHOWN powers the chown, SETUID + SETGID power the setresuid/setresgid
    # that setpriv performs. no-new-privileges:true means those caps
    # cannot be inherited by any child process — they are a one-shot
    # tool used by PID 1 only.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      api:
        condition: service_healthy
    # Same hardening for nginx: read-only root, no new privileges. Nginx
    # needs /var/cache/nginx and /var/run for pid/socket and the 5 temp
    # paths (client/proxy/fastcgi/uwsgi/scgi) — we provide them via
    # tmpfs. The master process must (a) chown these to UID 101 ("nginx")
    # before forking workers, and (b) setuid/setgid to UID 101 once it
    # is done binding :80. We therefore add back CAP_CHOWN, CAP_SETUID,
    # and CAP_SETGID — the same one-shot pattern used by the api. With
    # no-new-privileges, those capabilities cannot be inherited by any
    # child of the nginx master; the worker processes have no caps left.
    # We do NOT grant NET_BIND_SERVICE: the master runs as root long
    # enough to bind :80 and fork workers, then setuid(101) drops
    # privileges, so binding :80 happens before any capability drop.
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=16m
      - /var/run:size=4m
      - /tmp:size=8m
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # Use 127.0.0.1 explicitly: Alpine's `localhost` resolves to ::1 first
      # and nginx is configured to listen on IPv4 only.
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  certpulse-data:
